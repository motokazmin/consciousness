<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HRV Monitor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.min.css" />
  <style>
    :root { --bg: #111; --panel: #1a1a1a; --text: #ccc; --accent: #4fc3f7; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; }
    h1 { font-size: 1.1rem; font-weight: 600; }
    nav { display: flex; gap: 8px; margin-bottom: 16px; }
    nav button { background: #333; color: #eee; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
    nav button.active { background: var(--accent); color: #111; }
    section { display: none; }
    section.visible { display: block; }
    .panel { background: var(--panel); border-radius: 8px; padding: 16px; margin-bottom: 12px; max-width: 960px; }
    /* Графики на всю доступную ширину окна (форма остаётся уже) */
    .panel--plots { max-width: min(calc(100vw - 32px), 1680px); width: 100%; box-sizing: border-box; }
    label { display: block; margin: 8px 0 4px; font-size: 0.85rem; color: #999; }
    input, select { width: 100%; max-width: 400px; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #222; color: #eee; box-sizing: border-box; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .row > div { flex: 1; min-width: 160px; }
    button.primary { background: #81c784; color: #111; font-weight: 600; padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; margin-top: 12px; }
    button.danger { background: #e57373; color: #111; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
    th { color: #888; }
    tr:hover { background: #252525; cursor: pointer; }
    .plot-wrap { margin-top: 8px; }
    .status { font-family: ui-monospace, monospace; font-size: 0.85rem; color: #888; margin-top: 8px; }
    .err { color: #e57373; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>HRV Monitor</h1>
  <nav>
    <button type="button" data-tab="live" class="active">Запись</button>
    <button type="button" data-tab="archive">Архив</button>
  </nav>

  <section id="tab-live" class="visible">
    <div class="panel">
      <h2>Параметры сессии</h2>
      <div class="row">
        <div>
          <label>Участник (без пароля, для различия записей)</label>
          <input id="participant" type="text" placeholder="например, Аня" autocomplete="username" />
        </div>
        <div>
          <label>Тип активности (для анализа)</label>
          <select id="tag"></select>
        </div>
      </div>
      <label>Имя / заметка (необязательно)</label>
      <input id="session_name" type="text" placeholder="вечерняя медитация" />
      <div class="row">
        <div>
          <label>Источник</label>
          <select id="source">
            <option value="mock">Mock (без железа)</option>
            <option value="ble">BLE Polar H10</option>
            <option value="ant">ANT+ (USB stick)</option>
            <option value="ble_ant_fallback">BLE → ANT fallback</option>
          </select>
        </div>
        <div>
          <label>MAC адрес (BLE / fallback)</label>
          <input id="address" type="text" placeholder="AA:BB:CC:DD:EE:FF" />
        </div>
        <div>
          <label>Длительность (мин), пусто = до ручного стопа. Если указана — на графиках ось «сек от начала сессии» 0…T и видна вся кривая за опыт, без скользящего окна.</label>
          <input id="minutes" type="number" step="0.5" min="0.5" placeholder="∞" />
        </div>
      </div>
      <label><input type="checkbox" id="desktop_notify" checked /> notify-send при drift</label>
      <div>
        <button type="button" class="primary" id="btn_start">Старт</button>
        <button type="button" class="primary danger" id="btn_stop" disabled>Стоп</button>
      </div>
      <p class="status" style="font-size:0.8rem;color:#666;margin-top:8px;">
        Mock при типе «meditation»: симуляция RSA и спокойного ритма (не тот же сигнал, что для focus/rest).
      </p>
      <p class="status" id="live_status"></p>
      <p class="err" id="live_err"></p>
    </div>
    <div class="panel panel--plots" id="live_plots" style="display:none;">
      <div class="plot-wrap" id="rrPlot"></div>
      <div class="plot-wrap" id="rmPlot"></div>
    </div>
  </section>

  <section id="tab-archive">
    <div class="panel">
      <h2>Сессии</h2>
      <div class="row">
        <div><label>Фильтр участник</label><input id="flt_participant" type="text" /></div>
        <div><label>Фильтр тег</label><select id="flt_tag"><option value="">—</option></select></div>
        <div><button type="button" class="primary" id="btn_reload">Обновить</button></div>
      </div>
      <table><thead><tr><th>id</th><th>участник</th><th>тип</th><th>источник</th><th>начало</th><th>конец</th></tr></thead><tbody id="arch_rows"></tbody></table>
    </div>
    <div class="panel panel--plots" id="arch_detail" style="display:none;">
      <h2>Сессия <span id="arch_id"></span></h2>
      <pre id="arch_summary" class="status"></pre>
      <div class="plot-wrap" id="arch_rr"></div>
      <div class="plot-wrap" id="arch_rm"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
